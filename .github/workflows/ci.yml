name: CI Pipeline

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Clients
      run: |
        npm run prisma:generate --workspace=backend/auth-service --if-present || true
        npm run prisma:generate --workspace=backend/catalog-service --if-present || true
        npm run prisma:generate --workspace=backend/order-service --if-present || true
        npm run prisma:generate --workspace=backend/chat-service --if-present || true

    - name: Run Linter
      run: npm run lint

    - name: Check TypeScript Compilation
      run: npm run typecheck

    - name: Run Tests
      run: npm run test

    - name: Publish CI Summary
      if: success()
      run: |
        echo "### 🎉 CI Pipeline Exitoso!" >> $GITHUB_STEP_SUMMARY
        echo "Todos los pasos (Instalación, Lint, Typecheck y Tests) se completaron correctamente." >> $GITHUB_STEP_SUMMARY
